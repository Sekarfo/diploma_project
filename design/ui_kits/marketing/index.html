<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>opencode — UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: var(--color-canvas); }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="PrimaryNav.jsx"></script>
  <script type="text/babel" src="HeroTUI.jsx"></script>
  <script type="text/babel" src="InstallBlock.jsx"></script>
  <script type="text/babel" src="FeatureList.jsx"></script>
  <script type="text/babel" src="FAQList.jsx"></script>
  <script type="text/babel" src="ChartTile.jsx"></script>
  <script type="text/babel" src="TestimonialRow.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="Pages.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [page, setPage] = useState('home');
      const navigate = (id) => {
        if (id === 'home' || id === 'zen' || id === 'enterprise') setPage(id);
        // GitHub / Docs / Go / Download stay as no-op placeholders for the kit
      };
      return (
        <>
          <PrimaryNav current={page} onNavigate={navigate} />
          {page === 'home' && <HomePage navigate={navigate} />}
          {page === 'zen' && <ZenPage navigate={navigate} />}
          {page === 'enterprise' && <EnterprisePage />}
        </>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
