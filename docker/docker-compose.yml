name: diploma-recruitment

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: recruitment_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - recruitment_net

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: recruitment_backend
    # host.docker.internal resolves to the host machine on Docker Desktop (Windows / macOS).
    # On Linux add: extra_hosts: ["host.docker.internal:host-gateway"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Pull all keys from the project-root .env (OPENROUTER_API_KEY, CE tuning, etc.).
    # Values in `environment:` below override these where they need a container-specific value.
    env_file:
      - ../.env
    environment:
      # Container-only overrides (must point at sibling services, not host).
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-resumes_index}
      # Use the host machine's PostgreSQL (diploma database) so data
      # persists across container rebuilds and is shared with local dev.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-0000}@host.docker.internal:5432/${POSTGRES_DB:-diploma}
      # Run schema migrations on startup — needed to create kanban_entries and ai_analyses
      # tables on fresh DBs. The statements are all IF NOT EXISTS, so it's idempotent.
      DB_SCHEMA_AUTOCREATE: "true"
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - recruitment_net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: recruitment_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - recruitment_net

volumes:
  es_data:

networks:
  recruitment_net:
    driver: bridge
