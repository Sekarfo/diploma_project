name: diploma-recruitment

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: recruitment_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - recruitment_net

  postgres:
    image: postgres:16-alpine
    container_name: recruitment_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hr_shortlist}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hr_shortlist}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - recruitment_net

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: recruitment_backend
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-resumes_index}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hr_shortlist}
      DB_SCHEMA_AUTOCREATE: "true"
      AUTH_PASSWORD_PEPPER: ${AUTH_PASSWORD_PEPPER:-change-me-in-prod}
      AUTH_SESSION_TTL_MINUTES: ${AUTH_SESSION_TTL_MINUTES:-10080}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - recruitment_net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: recruitment_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - recruitment_net

volumes:
  es_data:
  pg_data:

networks:
  recruitment_net:
    driver: bridge
